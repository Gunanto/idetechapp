name: Run Tests
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MYSQL_ROOT_PASSWORD: idetech_root_secret
          MYSQL_DATABASE: idetech
          MYSQL_USER: idetech
          MYSQL_PASSWORD: idetech_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -uidetech -pidetech_secret"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    env:
      DATABASE_URL: mysql://idetech:idetech_secret@localhost:3306/idetech

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Tests
        run: bun test

      - name: Run Build
        run: bun run build
